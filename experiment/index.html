<!DOCTYPE html>
<html lang="en">

<head>

<!-- META -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neo Core · Minimal AI</title>

<link rel="icon" type="image/png" href="favicon.png">

<!-- =========================
KATEX (Math Rendering)
========================= -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js">
</script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
onload="renderMathInElement(document.body,{
delimiters:[
{left:'$$',right:'$$',display:true},
{left:'$',right:'$',display:false},
{left:'\\[',right:'\\]',display:true},
{left:'\\(',right:'\\)',display:false}
]});">
</script>

<!-- =========================
TAILWIND (utilities only)
========================= -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- =========================
CUSTOM STYLE
========================= -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ======================================================
SIDEBAR (ENHANCED)
====================================================== -->

<aside id="sidebar" class="sidebar">

<div class="sidebar-header">
  <div class="logo">
    <img src="favicon.png" class="favicon" alt="Neo">
  </div>
  <button class="icon-btn" onclick="toggleSidebar()" aria-label="Close sidebar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div class="sidebar-content">
  <button class="new-chat" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <span>New chat</span>
  </button>

  <!-- SEARCH BAR -->
  <div class="search-container">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchHistory" class="search-input" placeholder="Search chats..." autocomplete="off">
  </div>

  <div class="history-section">
    <div class="history-title">Recent</div>
    <div id="historyList" class="history-list"></div>
  </div>
</div>

<!-- REDESIGNED FOOTER: only user avatar with dropdown -->
<div class="sidebar-footer">
  <!-- User profile - clickable avatar with dropdown -->
  <div class="user-profile">
    <div class="user-avatar" onclick="toggleUserDropdown(event)">U</div>
    <div class="user-info">
      <div class="user-name">User</div>
    </div>
    <!-- Dropdown menu for user settings (hypothetical mode + clear chats) -->
    <div class="user-dropdown" id="userDropdown">
      <label class="dropdown-item hypothetical-toggle">
        <input type="checkbox" id="hypotheticalToggle" onchange="toggleHypothetical(this.checked)">
        <span>Hypothetical mode</span>
      </label>
      <button class="dropdown-item" onclick="clearAllChats()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        <span>Clear conversations</span>
      </button>
    </div>
  </div>
</div>

</aside>

<!-- ======================================================
SIDEBAR COLLAPSED BUTTON
====================================================== -->

<button id="sidebarToggle"
class="sidebar-toggle"
onclick="toggleSidebar()"
aria-label="Open sidebar">

<img src="favicon.png" class="favicon-small" alt="Neo">

</button>

<!-- ======================================================
TOP BAR (premium glass with dark mode toggle)
====================================================== -->

<header class="top-bar glass">

<div class="top-bar-content">

<span class="model-name">NEO</span>

<!-- Dark mode toggle button (premium) -->
<button id="darkModeToggle" class="top-bar-darkmode" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
  <!-- SVGs will be set dynamically by JavaScript -->
</button>

</div>

</header>

<!-- ======================================================
MAIN CHAT AREA
====================================================== -->

<main id="mainContent" class="main-content">

<div id="chatBox"
class="chat-container space-y-8 mb-40">
</div>

<!-- ======================================================
INPUT AREA (GPT STYLE CENTERED)
====================================================== -->

<div id="inputWrapper">

<div class="chat-container max-w-3xl mx-auto">

<div class="input-shell relative flex items-center">

<textarea
id="userInput"
rows="1"
placeholder="Ask Neo..."
class="chat-input"
oninput="autoExpand(this)"
onkeydown="handleKeyDown(event)">
</textarea>

<!-- SEND BUTTON (unchanged) -->

<button
id="sendButton"
class="send-btn"
onclick="startReasoning()">

<!-- SEND ICON -->

<svg class="send-icon"
width="18" height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2.5">

<path d="M12 19V5"/>
<path d="M5 12l7-7 7 7"/>

</svg>

<!-- LOADING -->

<svg class="loading-spinner hidden"
width="18"
height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<circle
cx="12"
cy="12"
r="10"
stroke-dasharray="32"
stroke-dashoffset="32"
stroke-linecap="round">

<animate
attributeName="stroke-dashoffset"
values="32;0"
dur="1s"
repeatCount="indefinite"/>

<animateTransform
attributeName="transform"
type="rotate"
from="0 12 12"
to="360 12 12"
dur="1s"
repeatCount="indefinite"/>

</circle>

</svg>

</button>

<!-- RETRY BUTTON -->

<div id="regenContainer"
class="regen-btn"
onclick="startReasoning(true)">

<svg width="14" height="14"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="3">

<path d="M23 4v6h-6"/>
<path d="M20.49 15
a9 9 0 1 1-2.12-9.36L23 10"/>

</svg>

<span>Retry</span>

</div>

</div>

</div>

</div>

</main>

<!-- ======================================================
SCRIPT
====================================================== -->

<script src="script.js"></script>

</body>
</html>
